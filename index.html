<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stroop Test - Time Pressure Study</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  #initial-loader { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #f8fafc; color: #64748b; font-size: 14px; }
</style>
</head>
<body>
<div id="root"><div id="initial-loader">Loading test…</div></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

/* ===========================================================
   ===  PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE  ======
   =========================================================== */
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzlXZaOBOFZ8k5nC2awnlucVPKnFrtNR0ADItqvGO-xeIPF7shLWvEEkGEZQuowdr9h/exec";

// ---------- Experiment configuration ----------
const COLORS = [
  { name: 'RED',    hex: '#dc2626', key: 'r' },
  { name: 'GREEN',  hex: '#16a34a', key: 'g' },
  { name: 'BLUE',   hex: '#2563eb', key: 'b' },
  { name: 'YELLOW', hex: '#ca8a04', key: 'y' },
];
const PRACTICE_TRIALS   = 8;
const BLOCK_DURATION_MS = 60_000;
const FIXATION_MS       = 250;
const ITI_MS            = 150;

// Performance Index benchmarks
const EXPECTED_ANSWERS  = 40;     // benchmark for efficiency component
const TARGET_RT_MS      = 1500;   // benchmark for speed component (1.5 s = excellent)
const MIN_VALID_ANSWERS = 5;      // below this, severe data-completeness penalty

// ---------- Helpers ----------
function makeTrial() {
  const wordIdx = Math.floor(Math.random() * COLORS.length);
  let inkIdx;
  if (Math.random() < 0.5) inkIdx = wordIdx;
  else { do { inkIdx = Math.floor(Math.random() * COLORS.length); } while (inkIdx === wordIdx); }
  return {
    word: COLORS[wordIdx].name,
    inkColor: COLORS[inkIdx].name,
    inkHex: COLORS[inkIdx].hex,
    congruent: wordIdx === inkIdx,
    correctKey: COLORS[inkIdx].key,
  };
}

function generateParticipantId() {
  const d = new Date();
  const ymd = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  const hm  = `${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}`;
  const rand = Math.random().toString(36).substring(2, 6).toUpperCase();
  return `P${ymd}-${hm}-${rand}`;
}

function toCSV(rows) {
  if (!rows.length) return '';
  const headers = Object.keys(rows[0]);
  const escape = (v) => { const s = String(v ?? ''); return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s; };
  return [headers.join(','), ...rows.map(r => headers.map(h => escape(r[h])).join(','))].join('\n');
}
function downloadCSV(filename, csv) {
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// Updated Performance Index formula:
//   PI = Efficiency × Accuracy × Speed × DataCompleteness × 100
function summarize(rows, label) {
  const main = rows.filter(r => r.block === 'main' && r.condition === label);
  if (!main.length) return null;

  const responded = main.filter(r => r.response !== '');
  const correct   = responded.filter(r => r.correct);
  const wrong     = responded.filter(r => !r.correct);

  const totalQuestions = main.length;
  const correctAnswers = correct.length;
  const wrongAnswers   = wrong.length;
  const accuracyRate   = totalQuestions ? (correctAnswers / totalQuestions) * 100 : 0;
  const errorRate      = totalQuestions ? (wrongAnswers   / totalQuestions) * 100 : 0;

  // Average response time across ALL responses (correct + incorrect),
  // as in the spec ("Mean of all response times").
  const allResponded = responded.filter(r => typeof r.rt_ms === 'number');
  const meanRT = allResponded.length
    ? allResponded.reduce((a,b) => a + b.rt_ms, 0) / allResponded.length
    : 0;

  const durationSec        = BLOCK_DURATION_MS / 1000;
  const questionRate       = (totalQuestions / durationSec) * 60;     // questions / minute
  const questionsPerSecond = totalQuestions / durationSec;            // for Question-Rate diagnostic
  const taskCompletionRate = totalQuestions ? (responded.length / totalQuestions) * 100 : 0;

  // ── Performance Index components ──────────────────────────────────────
  const efficiency      = Math.min(1, totalQuestions / EXPECTED_ANSWERS);
  const accuracyComp    = totalQuestions ? correctAnswers / totalQuestions : 0;
  const speed           = meanRT > 0 ? Math.min(1, TARGET_RT_MS / meanRT) : 0;
  const dataCompleteness = totalQuestions >= MIN_VALID_ANSWERS ? 1 : 0.1;
  const performanceIndex = efficiency * accuracyComp * speed * dataCompleteness * 100;

  // Stroop effect (diagnostic)
  const cCon = correct.filter(r => r.congruent);
  const cInc = correct.filter(r => !r.congruent);
  const rtCon = cCon.length ? cCon.reduce((a,b)=>a+b.rt_ms,0)/cCon.length : 0;
  const rtInc = cInc.length ? cInc.reduce((a,b)=>a+b.rt_ms,0)/cInc.length : 0;

  return {
    condition: label,
    totalQuestions, correctAnswers, wrongAnswers,
    accuracyRate, errorRate, meanRT,
    questionRate, questionsPerSecond, taskCompletionRate,
    efficiency, accuracyComp, speed, dataCompleteness, performanceIndex,
    stroopEffect: rtInc - rtCon,
  };
}

// ---------- Likert button row ----------
function LikertRow({ value, onChange }) {
  return (
    <div className="flex gap-2 justify-center">
      {[1,2,3,4,5].map(n => (
        <button
          key={n}
          type="button"
          onClick={() => onChange(n)}
          className={`flex-1 max-w-[68px] py-3 rounded-md font-semibold border-2 transition ${
            value === n
              ? 'bg-blue-600 border-blue-600 text-white'
              : 'bg-white border-slate-300 text-slate-700 hover:border-blue-400 hover:bg-blue-50'
          }`}
        >
          {n}
        </button>
      ))}
    </div>
  );
}

// ---------- Main component ----------
function StroopApp() {
  const [screen, setScreen] = useState('setup');
  const [participant, setParticipant] = useState({ id: '', age: '', gender: '' });
  const [conditionOrder, setConditionOrder] = useState('timed_first');
  const [blockIndex, setBlockIndex] = useState(0);

  const [practiceIdx, setPracticeIdx] = useState(0);
  const [practiceTrials, setPracticeTrials] = useState([]);
  const [currentTrial, setCurrentTrial] = useState(null);
  const [phase, setPhase] = useState('idle');
  const [data, setData] = useState([]);
  const [practiceFeedback, setPracticeFeedback] = useState(null);
  const [blockElapsedMs, setBlockElapsedMs] = useState(0);

  // Per-condition feedback ratings
  const [feedbackByCondition, setFeedbackByCondition] = useState({}); // { timed: {...}, untimed: {...} }
  const [currentRatings, setCurrentRatings] = useState({ difficulty: 0, timePressure: 0, cognitiveLoad: 0 });

  const [submitStatus, setSubmitStatus] = useState('idle');

  const stimOnsetRef     = useRef(0);
  const blockStartRef    = useRef(0);
  const fixationTimer    = useRef(null);
  const itiTimer         = useRef(null);
  const blockEndTimer    = useRef(null);
  const tickerRef        = useRef(null);
  const blockActiveRef   = useRef(false);
  const phaseRef         = useRef('idle');
  const currentTrialRef  = useRef(null);
  const trialCounterRef  = useRef(0);

  useEffect(() => { phaseRef.current = phase; }, [phase]);
  useEffect(() => { currentTrialRef.current = currentTrial; }, [currentTrial]);

  // Resolve current condition (works in main, feedback, and break screens)
  const currentCondition = (() => {
    if (screen === 'practice') return 'practice';
    if (screen === 'main' || screen === 'feedback' || screen === 'break') {
      const order = conditionOrder === 'timed_first' ? ['timed','untimed'] : ['untimed','timed'];
      return order[blockIndex];
    }
    return null;
  })();
  const isTimedVisible = currentCondition === 'timed';

  const clearAllTimers = () => {
    clearTimeout(fixationTimer.current);
    clearTimeout(itiTimer.current);
    clearTimeout(blockEndTimer.current);
    clearInterval(tickerRef.current);
  };

  // ---- Setup: pure-random order, with clear console log so you can verify ----
  const handleStartSession = () => {
    const newId = generateParticipantId();
    const newOrder = Math.random() < 0.5 ? 'timed_first' : 'untimed_first';
    console.log(`[Stroop] New session: id=${newId} order=${newOrder}`);
    setParticipant(prev => ({ ...prev, id: newId }));
    setConditionOrder(newOrder);
    setScreen('instructions');
  };

  const startPractice = () => {
    clearAllTimers();
    const trials = Array.from({ length: PRACTICE_TRIALS }, makeTrial);
    setPracticeTrials(trials); setPracticeIdx(0); setCurrentTrial(trials[0]);
    setPracticeFeedback(null); setScreen('practice'); setPhase('fixation');
  };

  const startMainBlock = () => {
    clearAllTimers();
    setBlockElapsedMs(0);
    trialCounterRef.current = 0;
    setCurrentTrial(makeTrial());
    setPracticeFeedback(null);
    setScreen('main'); setPhase('fixation');
    blockActiveRef.current = true;
    blockStartRef.current = performance.now();

    blockEndTimer.current = setTimeout(() => endMainBlock(), BLOCK_DURATION_MS);
    tickerRef.current = setInterval(() => {
      setBlockElapsedMs(Math.min(performance.now() - blockStartRef.current, BLOCK_DURATION_MS));
    }, 100);
  };

  const endMainBlock = () => {
    blockActiveRef.current = false;
    clearAllTimers();

    // If a stimulus was on screen and never got a response, log as incomplete
    if (phaseRef.current === 'stimulus' && currentTrialRef.current) {
      const trial = currentTrialRef.current;
      const order = conditionOrder === 'timed_first' ? ['timed','untimed'] : ['untimed','timed'];
      const incompleteRow = {
        participant_id: participant.id,
        age: participant.age, gender: participant.gender,
        condition_order: conditionOrder,
        condition: order[blockIndex],
        block: 'main',
        trial_num: trialCounterRef.current,
        word: trial.word, ink_color: trial.inkColor,
        congruent: trial.congruent, correct_key: trial.correctKey,
        response: '', correct: false,
        rt_ms: '', block_elapsed_ms: BLOCK_DURATION_MS,
        timestamp_iso: new Date().toISOString(),
      };
      setData(prev => [...prev, incompleteRow]);
    }

    setPhase('idle');
    setCurrentRatings({ difficulty: 0, timePressure: 0, cognitiveLoad: 0 });
    setScreen('feedback');
  };

  const handleFeedbackSubmit = () => {
    if (!currentRatings.difficulty || !currentRatings.timePressure || !currentRatings.cognitiveLoad) return;
    const cond = currentCondition;
    setFeedbackByCondition(prev => ({ ...prev, [cond]: { ...currentRatings } }));

    if (blockIndex === 0) {
      setBlockIndex(1);
      setScreen('break');
    } else {
      setScreen('finished');
    }
  };

  // Phase advancement
  useEffect(() => {
    if (screen !== 'practice' && screen !== 'main') return;

    if (phase === 'fixation') {
      fixationTimer.current = setTimeout(() => {
        if (screen === 'main' && !blockActiveRef.current) return;
        stimOnsetRef.current = performance.now();
        if (screen === 'main') trialCounterRef.current++;
        setPhase('stimulus');
      }, FIXATION_MS);
    } else if (phase === 'iti') {
      itiTimer.current = setTimeout(() => {
        if (screen === 'practice') {
          const next = practiceIdx + 1;
          if (next >= practiceTrials.length) { setScreen('break'); setPhase('idle'); return; }
          setPracticeIdx(next); setCurrentTrial(practiceTrials[next]);
          setPracticeFeedback(null); setPhase('fixation');
        } else {
          if (!blockActiveRef.current) return;
          setCurrentTrial(makeTrial());
          setPhase('fixation');
        }
      }, ITI_MS);
    }
    return () => { clearTimeout(fixationTimer.current); clearTimeout(itiTimer.current); };
  }, [phase, screen, practiceIdx]);

  // Response handling
  const recordResponse = useCallback((key) => {
    if (phase !== 'stimulus' || !currentTrial) return;
    const rt = performance.now() - stimOnsetRef.current;
    const correct = key === currentTrial.correctKey;
    const trialNum = screen === 'practice' ? practiceIdx + 1 : trialCounterRef.current;
    const row = {
      participant_id: participant.id,
      age: participant.age, gender: participant.gender,
      condition_order: conditionOrder,
      condition: screen === 'practice' ? 'practice' : currentCondition,
      block: screen === 'practice' ? 'practice' : 'main',
      trial_num: trialNum,
      word: currentTrial.word, ink_color: currentTrial.inkColor,
      congruent: currentTrial.congruent, correct_key: currentTrial.correctKey,
      response: key, correct, rt_ms: Math.round(rt),
      block_elapsed_ms: screen === 'main' ? Math.round(performance.now() - blockStartRef.current) : '',
      timestamp_iso: new Date().toISOString(),
    };
    setData(prev => [...prev, row]);
    if (screen === 'practice') setPracticeFeedback(correct ? 'correct' : 'incorrect');
    setPhase('iti');
  }, [phase, currentTrial, screen, practiceIdx, participant, conditionOrder, currentCondition]);

  useEffect(() => {
    const onKey = (e) => {
      if (phase !== 'stimulus') return;
      const k = e.key.toLowerCase();
      if (['r','g','b','y'].includes(k)) recordResponse(k);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [phase, recordResponse]);

  useEffect(() => () => clearAllTimers(), []);

  // ---- Cloud submission ----
  const submitToCloud = useCallback(async () => {
    if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes('PASTE_YOUR')) {
      setSubmitStatus('error');
      return;
    }
    setSubmitStatus('sending');
    const sTimed   = summarize(data, 'timed');
    const sUntimed = summarize(data, 'untimed');
    const fbTimed   = feedbackByCondition.timed   || {};
    const fbUntimed = feedbackByCondition.untimed || {};

    // Build ONE row per session containing both conditions
    const fields = (prefix, s, fb) => ({
      [`${prefix}_performance_index`]:        s ? +s.performanceIndex.toFixed(2) : '',
      [`${prefix}_question_rate_per_min`]:    s ? +s.questionRate.toFixed(2) : '',
      [`${prefix}_accuracy_rate_pct`]:        s ? +s.accuracyRate.toFixed(2) : '',
      [`${prefix}_avg_response_time_ms`]:     s ? Math.round(s.meanRT) : '',
      [`${prefix}_total_questions`]:          s ? s.totalQuestions : '',
      [`${prefix}_correct_answers`]:          s ? s.correctAnswers : '',
      [`${prefix}_wrong_answers`]:            s ? s.wrongAnswers : '',
      [`${prefix}_error_rate_pct`]:           s ? +s.errorRate.toFixed(2) : '',
      [`${prefix}_task_completion_rate_pct`]: s ? +s.taskCompletionRate.toFixed(2) : '',
      [`${prefix}_stroop_effect_ms`]:         s ? Math.round(s.stroopEffect) : '',
      [`${prefix}_perceived_difficulty`]:       fb.difficulty    || '',
      [`${prefix}_perceived_time_pressure`]:    fb.timePressure  || '',
      [`${prefix}_subjective_cognitive_load`]:  fb.cognitiveLoad || '',
    });

    const combinedRow = {
      submitted_at: new Date().toISOString(),
      participant_id: participant.id,
      age: participant.age,
      gender: participant.gender,
      condition_order: conditionOrder,
      ...fields('timed',   sTimed,   fbTimed),
      ...fields('untimed', sUntimed, fbUntimed),
    };

    const payload = {
      session_id: `${participant.id}_${Date.now()}`,
      summary: [combinedRow],
    };

    // Always print payload to console as last-resort manual backup
    console.log('[Stroop] Submitting payload:', payload);
    // Also save to localStorage as recovery backup
    try {
      const key = `stroop_${participant.id}_${Date.now()}`;
      localStorage.setItem(key, JSON.stringify(payload));
    } catch (e) { /* quota or private mode — ignore */ }

    try {
      // Use no-cors (Apps Script returns a 302 redirect to the actual content
      // which browsers block under standard CORS). With no-cors the body is
      // still delivered; we just can't read the response status.
      // Also use keepalive so the request survives page navigation.
      await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        keepalive: true,
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload),
      });
      setSubmitStatus('ok');
    } catch (err) {
      console.error('[Stroop] Cloud submit failed:', err);
      setSubmitStatus('error');
    }
  }, [data, participant, conditionOrder, feedbackByCondition]);

  useEffect(() => {
    if (screen === 'finished' && submitStatus === 'idle') submitToCloud();
  }, [screen, submitStatus, submitToCloud]);

  // ---------- UI ----------

  if (screen === 'setup') {
    return (
      <div className="min-h-screen bg-slate-50 flex items-center justify-center p-6">
        <div className="max-w-xl w-full bg-white rounded-lg shadow-md p-8">
          <h1 className="text-3xl font-bold text-slate-800 mb-1">Stroop Test</h1>
          <p className="text-slate-600 mb-6">Effect of Time Pressure on Cognitive Performance</p>
          <div className="space-y-4">
            <div>
              <label className="block text-sm font-medium text-slate-700 mb-1">Age *</label>
              <input type="number" value={participant.age}
                onChange={(e) => setParticipant({ ...participant, age: e.target.value })}
                placeholder="e.g., 21"
                className="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>
            <div>
              <label className="block text-sm font-medium text-slate-700 mb-1">Gender *</label>
              <select value={participant.gender}
                onChange={(e) => setParticipant({ ...participant, gender: e.target.value })}
                className="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">Select…</option>
                <option>Female</option><option>Male</option>
                <option>Other</option><option>Prefer not to say</option>
              </select>
            </div>
          </div>
          <button
            disabled={!participant.age.toString().trim() || !participant.gender}
            onClick={handleStartSession}
            className="mt-6 w-full bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 text-white font-medium py-3 rounded-md transition">
            Continue to Instructions
          </button>
          <p className="text-xs text-slate-500 mt-4 text-center">
            Two 60-second blocks. Order is randomized for each participant.
          </p>
        </div>
      </div>
    );
  }

  if (screen === 'instructions') {
    return (
      <div className="min-h-screen bg-slate-50 flex items-center justify-center p-6">
        <div className="max-w-2xl w-full bg-white rounded-lg shadow-md p-8">
          <h2 className="text-2xl font-bold text-slate-800 mb-4">Instructions</h2>
          <div className="space-y-4 text-slate-700">
            <p>Color words will appear one at a time:&nbsp;
              <span style={{color:'#dc2626'}} className="font-bold">RED</span>,&nbsp;
              <span style={{color:'#16a34a'}} className="font-bold">GREEN</span>,&nbsp;
              <span style={{color:'#2563eb'}} className="font-bold">BLUE</span>, and&nbsp;
              <span style={{color:'#ca8a04'}} className="font-bold">YELLOW</span>.
            </p>
            <p className="font-medium">Respond with the <u>INK COLOR</u> the word is printed in - <u>not</u> what the word says.</p>
            <div className="bg-slate-100 rounded p-4">
              <p className="font-medium mb-2">Use these keys:</p>
              <div className="grid grid-cols-4 gap-3 text-center">
                <div><kbd className="px-2 py-1 bg-white border border-slate-300 rounded font-bold">R</kbd><div className="text-sm mt-1" style={{color:'#dc2626'}}>Red</div></div>
                <div><kbd className="px-2 py-1 bg-white border border-slate-300 rounded font-bold">G</kbd><div className="text-sm mt-1" style={{color:'#16a34a'}}>Green</div></div>
                <div><kbd className="px-2 py-1 bg-white border border-slate-300 rounded font-bold">B</kbd><div className="text-sm mt-1" style={{color:'#2563eb'}}>Blue</div></div>
                <div><kbd className="px-2 py-1 bg-white border border-slate-300 rounded font-bold">Y</kbd><div className="text-sm mt-1" style={{color:'#ca8a04'}}>Yellow</div></div>
              </div>
            </div>
            <p>Example: <span style={{color:'#2563eb'}} className="font-bold text-xl">RED</span> &rarr; press&nbsp;
              <kbd className="px-2 py-1 bg-slate-100 border border-slate-300 rounded font-bold">B</kbd> (ink is blue).</p>
            <p>Short <strong>{PRACTICE_TRIALS}-trial practice</strong> first, then <strong>two 60-second blocks</strong>.
              After each block you'll answer 3 short feedback questions.</p>
          </div>
          <button onClick={startPractice}
            className="mt-6 w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-md transition">
            Start Practice
          </button>
        </div>
      </div>
    );
  }

  if (screen === 'break') {
    const order = conditionOrder === 'timed_first' ? ['timed','untimed'] : ['untimed','timed'];
    const upcoming = order[blockIndex];
    const isPostPractice = data.every(d => d.block === 'practice');
    return (
      <div className="min-h-screen bg-slate-50 flex items-center justify-center p-6">
        <div className="max-w-2xl w-full bg-white rounded-lg shadow-md p-8">
          <h2 className="text-2xl font-bold text-slate-800 mb-4">
            {isPostPractice ? 'Practice complete' : 'Take a short break'}
          </h2>
          <div className="space-y-4 text-slate-700">
            <p>Next: the&nbsp;
              <strong className={upcoming === 'timed' ? 'text-rose-600' : 'text-emerald-600'}>
                {upcoming === 'timed' ? 'TIMED (timer visible)' : 'UNTIMED (no timer)'}
              </strong>&nbsp;block - 60 seconds.
            </p>
            {upcoming === 'timed' ? (
              <div className="bg-rose-50 border border-rose-200 rounded p-4">
                <p className="font-medium text-rose-900">⏱ Timed condition - 60 seconds</p>
                <p className="text-sm mt-1">
                  A countdown will be visible on screen. Answer as many words as you can before time runs out.
                </p>
              </div>
            ) : (
              <div className="bg-emerald-50 border border-emerald-200 rounded p-4">
                <p className="font-medium text-emerald-900">∞ Untimed condition - 60 seconds</p>
                <p className="text-sm mt-1">
                  No timer will be shown. Just keep responding to each word - the block will end automatically.
                </p>
              </div>
            )}
            <p className="text-sm text-slate-500">Trials appear continuously - as soon as you press a key, the next word appears.</p>
          </div>
          <button onClick={startMainBlock}
            className="mt-6 w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-md transition">
            Start {upcoming === 'timed' ? 'Timed' : 'Untimed'} block
          </button>
        </div>
      </div>
    );
  }

  if (screen === 'practice' || screen === 'main') {
    const isMain = screen === 'main';
    const timeLeftMs = Math.max(0, BLOCK_DURATION_MS - blockElapsedMs);
    const mm = Math.floor(timeLeftMs / 60000);
    const ss = Math.floor((timeLeftMs % 60000) / 1000);
    const timeStr = `${mm}:${ss.toString().padStart(2,'0')}`;

    const timerTextClass = timeLeftMs > 30000 ? 'text-green-400'
      : timeLeftMs > 10000 ? 'text-orange-400' : 'text-rose-400';
    const timerBarClass = timeLeftMs > 30000 ? 'bg-green-500'
      : timeLeftMs > 10000 ? 'bg-orange-500' : 'bg-rose-500';

    return (
      <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center p-6 select-none relative">
        {!isMain && (
          <div className="absolute top-6 left-1/2 -translate-x-1/2 text-slate-400 text-sm">
            Practice · Trial {practiceIdx + 1} / {PRACTICE_TRIALS}
          </div>
        )}
        {isMain && isTimedVisible && (
          <div className="absolute top-6 left-1/2 -translate-x-1/2 flex flex-col items-center">
            <div className={`text-5xl font-mono font-bold tabular-nums transition-colors duration-500 ${timerTextClass}`}>
              {timeStr}
            </div>
            <div className="w-64 bg-slate-800 rounded-full h-2 mt-2">
              <div className={`h-2 rounded-full transition-all duration-300 ${timerBarClass}`}
                style={{ width: `${(timeLeftMs / BLOCK_DURATION_MS) * 100}%` }} />
            </div>
          </div>
        )}
        {isMain && !isTimedVisible && (
          <div className="absolute top-6 left-1/2 -translate-x-1/2 text-slate-500 text-xs uppercase tracking-widest">
            Untimed Block
          </div>
        )}

        <div className="h-64 flex items-center justify-center">
          {phase === 'fixation' && <div className="text-6xl text-slate-500 font-light">+</div>}
          {phase === 'stimulus' && currentTrial && (
            <div className="text-7xl font-bold tracking-wide" style={{color: currentTrial.inkHex}}>
              {currentTrial.word}
            </div>
          )}
          {phase === 'iti' && screen === 'practice' && practiceFeedback && (
            <div className={`text-3xl font-medium ${practiceFeedback === 'correct' ? 'text-emerald-400' : 'text-rose-400'}`}>
              {practiceFeedback === 'correct' ? '✓ Correct' : '✗ Incorrect'}
            </div>
          )}
        </div>

        <div className="mt-12 flex gap-3 text-slate-400 text-sm">
          <span><kbd className="px-2 py-1 bg-slate-800 rounded text-slate-200">R</kbd> Red</span>
          <span><kbd className="px-2 py-1 bg-slate-800 rounded text-slate-200">G</kbd> Green</span>
          <span><kbd className="px-2 py-1 bg-slate-800 rounded text-slate-200">B</kbd> Blue</span>
          <span><kbd className="px-2 py-1 bg-slate-800 rounded text-slate-200">Y</kbd> Yellow</span>
        </div>
      </div>
    );
  }

  // ---- Feedback screen (after each block) ----
  if (screen === 'feedback') {
    const allRated = currentRatings.difficulty && currentRatings.timePressure && currentRatings.cognitiveLoad;
    return (
      <div className="min-h-screen bg-slate-50 flex items-center justify-center p-6">
        <div className="max-w-2xl w-full bg-white rounded-lg shadow-md p-8">
          <h2 className="text-2xl font-bold text-slate-800 mb-2">Please Provide Your Feedback</h2>
          <p className="text-slate-600 text-sm mb-2">
            Thank you for completing this part of the experiment.
            Please indicate how strongly you agree or disagree with the following statements based on your experience during the&nbsp;
            <strong className={isTimedVisible ? 'text-rose-600' : 'text-emerald-600'}>
              {isTimedVisible ? 'TIMED' : 'UNTIMED'}
            </strong>&nbsp;block you just completed.
          </p>
          <div className="bg-slate-50 border border-slate-200 rounded p-3 mb-6 text-xs text-slate-600">
            <strong>Response Scale:</strong> 1 = Strongly Disagree · 2 = Disagree · 3 = Neither Agree nor Disagree · 4 = Agree · 5 = Strongly Agree
          </div>

          <div className="space-y-6">
            <div>
              <p className="font-semibold text-slate-800 mb-1">1. Perceived Difficulty</p>
              <p className="text-sm text-slate-600 mb-3">
                I found this task difficult to complete successfully and felt that the task was more challenging than I expected.
              </p>
              <LikertRow value={currentRatings.difficulty}
                onChange={(v) => setCurrentRatings(r => ({ ...r, difficulty: v }))} />
            </div>

            <div>
              <p className="font-semibold text-slate-800 mb-1">2. Perceived Time Pressure</p>
              <p className="text-sm text-slate-600 mb-3">
                While performing this task, I felt under significant time pressure and was concerned that I might not finish before the available time ran out.
              </p>
              <LikertRow value={currentRatings.timePressure}
                onChange={(v) => setCurrentRatings(r => ({ ...r, timePressure: v }))} />
            </div>

            <div>
              <p className="font-semibold text-slate-800 mb-1">3. Subjective Cognitive Load</p>
              <p className="text-sm text-slate-600 mb-3">
                Completing this task required a high level of mental effort, concentration, and continuous attention throughout the entire session.
              </p>
              <LikertRow value={currentRatings.cognitiveLoad}
                onChange={(v) => setCurrentRatings(r => ({ ...r, cognitiveLoad: v }))} />
            </div>
          </div>

          <button
            disabled={!allRated}
            onClick={handleFeedbackSubmit}
            className="mt-8 w-full bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 text-white font-medium py-3 rounded-md transition">
            {blockIndex === 0 ? 'Continue to next block' : 'Submit and finish'}
          </button>
          {!allRated && (
            <p className="text-xs text-slate-500 text-center mt-2">Please answer all three questions to continue.</p>
          )}
        </div>
      </div>
    );
  }

  if (screen === 'finished') {
    return (
      <div className="min-h-screen bg-slate-50 flex items-center justify-center p-6">
        <div className="max-w-md w-full text-center">
          <div className="text-7xl mb-6">&#128522;</div>
          <h2 className="text-3xl font-semibold text-slate-800">Session complete &#8212; thank you!</h2>
          <div className="mt-6">
            {submitStatus === 'sending' && (
              <div className="flex items-center justify-center gap-2 text-slate-500 text-sm">
                <svg className="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                  <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
                </svg>
                Sending data&#8230;
              </div>
            )}
            {submitStatus === 'ok' && (
              <div className="text-emerald-600 text-sm font-medium">
                &#10003; Data submitted.
              </div>
            )}
            {submitStatus === 'error' && (
              <div className="text-rose-600 text-sm">
                Upload issue &mdash; please notify the researcher (session: <span className="font-mono">{participant.id}</span>).
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<StroopApp />);
</script>
</body>
</html>
